<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <title>anubis3100 — Studies</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #111111;
      --mid: #555555;
      --faint: #dddddd;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      border-bottom: 1px solid var(--faint);
    }

    .nav-logo {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.45;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }
    .nav-links a.active {
      opacity: 1;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* ── painting dropdown ── */
    .nav-dropdown { position: relative; }
    .nav-dropdown > a { cursor: pointer; user-select: none; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 16px);
      right: 0;
      background: var(--bg);
      border: 1px solid var(--faint);
      padding: 16px 20px;
      min-width: 120px;
      flex-direction: column;
      gap: 14px;
      z-index: 300;
    }
    .dropdown-menu.open { display: flex; }
    .dropdown-menu a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.45;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .dropdown-menu a:hover { opacity: 1; }
    .dropdown-menu a.active { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

    main { padding-top: 65px; }

    .section { padding: 72px 0 80px; }

    .strip {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 40px 24px;
      cursor: grab;
      -webkit-overflow-scrolling: touch;
    }

    .strip:active { cursor: grabbing; }
    .strip::-webkit-scrollbar { height: 6px; }
    .strip::-webkit-scrollbar-track { background: var(--faint); }
    .strip::-webkit-scrollbar-thumb { background: var(--mid); border-radius: 3px; }

    .artwork { flex: 0 0 auto; cursor: pointer; }

    .artwork-img-wrap {
      height: 68vh;
      overflow: hidden;
      background: #f5f5f5;
    }

    .artwork-img-wrap img {
      height: 100%;
      width: auto;
      display: block;
      object-fit: cover;
      transition: opacity 0.4s ease, transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .artwork:hover .artwork-img-wrap img { opacity: 0.88; transform: scale(1.04); }

    .artwork-info { padding: 12px 2px 0; max-width: 320px; }

    .artwork-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1.5;
    }

    .artwork-meta {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--mid);
    }

    footer {
      padding: 40px;
      border-top: 1px solid var(--faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    footer span {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
    }

    footer a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--ink); }

    /* ── lightbox ── */
    #lightbox {
      display: flex;
      visibility: hidden;
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 80px 40px 40px;
      transition: background 0.3s ease, visibility 0s linear 0.3s;
    }

    #lightbox.open {
      visibility: visible;
      pointer-events: auto;
      background: rgba(255,255,255,0.96);
      transition: background 0.3s ease, visibility 0s linear 0s;
    }

    @keyframes lbImgIn {
      from { opacity: 0; transform: scale(0.84); }
      to   { opacity: 1; transform: scale(1);    }
    }
    @keyframes lbImgOut {
      from { opacity: 1; transform: scale(1);    }
      to   { opacity: 0; transform: scale(0.91); }
    }
    @keyframes lbFadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0);    }
    }
    @keyframes lbCloseFade {
      from { opacity: 0; }
      to   { opacity: 0.5; }
    }

    #lightbox-img {
      max-width: min(88vw, 900px);
      max-height: 82vh;
      object-fit: contain;
      display: block;
    }
    #lightbox-img.lb-entering {
      animation: lbImgIn 0.44s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    #lightbox-img.lb-leaving {
      animation: lbImgOut 0.22s ease both;
    }
    #lightbox-caption.lb-entering {
      animation: lbFadeUp 0.4s ease 0.2s both;
    }
    #lightbox.open #lightbox-close {
      animation: lbCloseFade 0.3s ease 0.05s both;
    }

    #lightbox-caption {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }

    #lightbox-close {
      position: fixed;
      top: 22px;
      right: 40px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    #lightbox-close:hover { opacity: 1; }

    /* ── hamburger button ── */
    .nav-burger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }
    .nav-burger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--ink);
      transition: transform 0.2s, opacity 0.2s;
    }
    .nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── tablet (768px – 1024px) ── */
    @media (max-width: 1024px) and (min-width: 768px) {
      nav { padding: 20px 28px; }
      .nav-links { gap: 24px; }
      .strip { padding: 0 28px 20px; }
      footer { padding: 32px 28px; }
    }

    /* ── mobile (< 768px) ── */
    @media (max-width: 767px) {
      nav { padding: 16px 20px; }

      .nav-burger { display: flex; }

      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--bg);
        border-bottom: 1px solid var(--faint);
        flex-direction: column;
        gap: 0;
        padding: 0 20px;
      }
      .nav-links.mobile-open { display: flex; }
      .nav-links > li {
        padding: 14px 0;
        border-bottom: 1px solid var(--faint);
        width: 100%;
      }
      .nav-links > li:last-child { border-bottom: none; }
      .nav-links a { font-size: 12px; letter-spacing: 0.14em; }

      .nav-dropdown { position: static; }
      .dropdown-menu {
        position: static !important;
        display: flex !important;
        border: none;
        padding: 10px 0 4px 16px;
        min-width: auto;
        gap: 12px;
      }
      .dropdown-menu a { font-size: 11px; }

      .strip { padding: 0 20px 14px; }
      .artwork-img-wrap { height: 58vh; }

      #lightbox { padding: 60px 16px 60px; }
      #lightbox-close { right: 16px; top: 16px; }
      #lightbox-caption { white-space: normal; width: calc(100% - 40px); text-align: center; }

      .section { padding: 40px 0 48px; }

      footer { padding: 24px 20px; flex-direction: column; gap: 8px; align-items: flex-start; }
    }

    /* ── dark mode ── */
    body { transition: background-color 0.3s ease, color 0.3s ease; }
    body.dark {
      --bg: #0f0f0f;
      --ink: #eeeeee;
      --mid: #888888;
      --faint: #2a2a2a;
    }

    /* ── theme toggle ── */
    .theme-toggle {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.45;
      transition: opacity 0.2s;
      padding: 0;
      flex-shrink: 0;
    }
    .theme-toggle:hover { opacity: 1; }

    /* ── custom cursor ── */
    * { cursor: none !important; }
    .cursor-dot {
      position: fixed;
      width: 7px;
      height: 7px;
      background: var(--ink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: width 0.18s ease, height 0.18s ease, opacity 0.18s ease, background 0.3s ease;
      top: 0; left: 0;
    }
    .cursor-dot.expanded { width: 28px; height: 28px; opacity: 0.25; }

    /* ── page transitions ── */
    @keyframes pgFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pgFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
    body { animation: pgFadeIn 0.4s ease both; }
    body.leaving { animation: pgFadeOut 0.25s ease both; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">anubis3100</a>
    <ul class="nav-links">
      <li><a href="index.html">Digital</a></li>
      <li class="nav-dropdown">
        <a id="painting-toggle" class="active">Painting</a>
        <div class="dropdown-menu" id="painting-menu">
          <a href="physical.html">Physical</a>
          <a href="studies.html" class="active">Studies</a>
        </div>
      </li>
      <li><a href="video.html">Video</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="https://twitter.com/anubis_3100" target="_blank">↗</a></li>
    </ul>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">◑</button>
    <button class="nav-burger" id="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main>
    <section class="section">
      <div class="strip" id="gallery-studies"></div>
    </section>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lightbox-close" aria-label="Close">close ✕</button>
    <img id="lightbox-img" src="" alt="" />
    <p id="lightbox-caption"></p>
  </div>

  <footer>
    <span>&copy; anubis3100</span>
    <a href="https://twitter.com/anubis_3100" target="_blank">Twitter ↗</a>
  </footer>

  <script>
    const studies = [
      { title: "Untitled", meta: "", file: "studies-1.jpg" },
      { title: "Untitled", meta: "", file: "studies-2.jpg" },
      { title: "Untitled", meta: "", file: "studies-3.jpg" },
    ];

    function makeDraggable(el) {
      let isDown = false, startX, scrollLeft, moved = false;
      el.addEventListener('mousedown', e => { isDown = true; moved = false; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; });
      el.addEventListener('mouseleave', () => isDown = false);
      el.addEventListener('mouseup', () => isDown = false);
      el.addEventListener('mousemove', e => {
        if (!isDown) return;
        e.preventDefault();
        moved = true;
        el.scrollLeft = scrollLeft - (e.pageX - el.offsetLeft - startX) * 1.2;
      });
      el.addEventListener('click', e => { if (moved) e.stopPropagation(); }, true);
    }

    const gallery = document.getElementById('gallery-studies');

    studies.forEach(work => {
      const el = document.createElement('div');
      el.className = 'artwork';
      el.innerHTML = `
        <div class="artwork-img-wrap">
          <img src="assets/studies/${work.file}" alt="${work.title}" loading="lazy" />
        </div>
        <div class="artwork-info">
          <p class="artwork-title">${work.title}</p>
          <p class="artwork-meta">${work.meta}</p>
        </div>
      `;
      el.addEventListener('click', () => openLightbox(`assets/studies/${work.file}`, work.title));
      gallery.appendChild(el);
    });

    makeDraggable(gallery);

    // ── lightbox ─────────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCaption = document.getElementById('lightbox-caption');
    const lbClose = document.getElementById('lightbox-close');

    function openLightbox(src, caption) {
      lbImg.src = src;
      lbImg.alt = caption;
      lbCaption.textContent = caption;
      lbImg.classList.remove('lb-entering', 'lb-leaving');
      lbCaption.classList.remove('lb-entering');
      void lbImg.offsetWidth;
      lbImg.classList.add('lb-entering');
      lbCaption.classList.add('lb-entering');
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lbImg.classList.remove('lb-entering');
      lbImg.classList.add('lb-leaving');
      lbCaption.classList.remove('lb-entering');
      lightbox.classList.remove('open');
      setTimeout(() => {
        lbImg.classList.remove('lb-leaving');
        lbImg.src = '';
        document.body.style.overflow = '';
      }, 280);
    }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    const paintingToggle = document.getElementById('painting-toggle');
    const paintingMenu = document.getElementById('painting-menu');
    paintingToggle.addEventListener('click', e => {
      e.stopPropagation();
      if (window.innerWidth >= 768) paintingMenu.classList.toggle('open');
    });

    // ── mobile nav ──────────────────────────────────────────────
    const navBurger = document.getElementById('nav-burger');
    const navLinksList = document.querySelector('.nav-links');
    navBurger.addEventListener('click', e => {
      e.stopPropagation();
      navBurger.classList.toggle('open');
      navLinksList.classList.toggle('mobile-open');
    });

    document.addEventListener('click', () => {
      paintingMenu.classList.remove('open');
      navBurger.classList.remove('open');
      navLinksList.classList.remove('mobile-open');
    });

    // ── custom cursor ─────────────────────────────────────────────
    const cursorDot = document.createElement('div');
    cursorDot.className = 'cursor-dot';
    document.body.appendChild(cursorDot);
    document.addEventListener('mousemove', e => {
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseleave', () => cursorDot.style.opacity = '0');
    document.addEventListener('mouseenter', () => cursorDot.style.opacity = '');
    document.querySelectorAll('a, button, .artwork, [role="button"]').forEach(el => {
      el.addEventListener('mouseenter', () => cursorDot.classList.add('expanded'));
      el.addEventListener('mouseleave', () => cursorDot.classList.remove('expanded'));
    });

    // ── page transitions ──────────────────────────────────────────
    document.querySelectorAll('a[href]').forEach(link => {
      if (link.target === '_blank') return;
      const href = link.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
      link.addEventListener('click', function(e) {
        e.preventDefault();
        document.body.classList.add('leaving');
        setTimeout(() => { window.location.href = this.getAttribute('href'); }, 260);
      });
    });

    // ── dark mode ─────────────────────────────────────────────────
    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>
</body>
</html>
