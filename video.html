<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <title>anubis3100 — Video</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --ink: #111111;
      --mid: #555555;
      --faint: #dddddd;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    /* ── nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      border-bottom: 1px solid var(--faint);
    }

    .nav-logo {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.45;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }
    .nav-links a.active {
      opacity: 1;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    /* ── painting dropdown ── */
    .nav-dropdown { position: relative; }
    .nav-dropdown > a { cursor: pointer; user-select: none; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 16px);
      right: 0;
      background: var(--bg);
      border: 1px solid var(--faint);
      padding: 16px 20px;
      min-width: 120px;
      flex-direction: column;
      gap: 14px;
      z-index: 300;
    }
    .dropdown-menu.open { display: flex; }
    .dropdown-menu a {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.45;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .dropdown-menu a:hover { opacity: 1; }
    .dropdown-menu a.active { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

    /* ── main ── */
    main {
      padding-top: 65px;
    }

    /* ── video section ── */
    .section {
      padding: 72px 40px 80px;
    }

    .video-grid {
      display: flex;
      flex-direction: column;
      gap: 64px;
      max-width: 960px;
    }

    .video-item {}

    .video-embed-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      background: #f5f5f5;
      overflow: hidden;
    }

    .video-embed-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .video-info {
      padding: 12px 2px 0;
    }

    .video-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1.5;
    }

    .video-meta {
      margin-top: 3px;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--mid);
      line-height: 1.5;
    }

    /* ── footer ── */
    footer {
      padding: 40px;
      border-top: 1px solid var(--faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    footer span {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
    }

    footer a {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--ink); }

    /* ── hamburger button ── */
    .nav-burger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }
    .nav-burger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--ink);
      transition: transform 0.2s, opacity 0.2s;
    }
    .nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── tablet (768px – 1024px) ── */
    @media (max-width: 1024px) and (min-width: 768px) {
      nav { padding: 20px 28px; }
      .nav-links { gap: 24px; }
      .section { padding: 56px 28px 64px; }
      footer { padding: 32px 28px; }
    }

    /* ── mobile (< 768px) ── */
    @media (max-width: 767px) {
      nav { padding: 16px 20px; }

      .nav-burger { display: flex; }

      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--bg);
        border-bottom: 1px solid var(--faint);
        flex-direction: column;
        gap: 0;
        padding: 0 20px;
      }
      .nav-links.mobile-open { display: flex; }
      .nav-links > li {
        padding: 14px 0;
        border-bottom: 1px solid var(--faint);
        width: 100%;
      }
      .nav-links > li:last-child { border-bottom: none; }
      .nav-links a { font-size: 12px; letter-spacing: 0.14em; }

      .nav-dropdown { position: static; }
      .dropdown-menu {
        position: static !important;
        display: flex !important;
        border: none;
        padding: 10px 0 4px 16px;
        min-width: auto;
        gap: 12px;
      }
      .dropdown-menu a { font-size: 11px; }

      .section { padding: 40px 20px 48px; }

      footer { padding: 24px 20px; flex-direction: column; gap: 8px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">anubis3100</a>
    <ul class="nav-links">
      <li><a href="index.html">Digital</a></li>
      <li class="nav-dropdown">
        <a id="painting-toggle">Painting</a>
        <div class="dropdown-menu" id="painting-menu">
          <a href="physical.html">Physical</a>
          <a href="studies.html">Studies</a>
        </div>
      </li>
      <li><a href="video.html" class="active">Video</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="https://twitter.com/anubis_3100" target="_blank">↗</a></li>
    </ul>
    <button class="nav-burger" id="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main>
    <section class="section">
      <div class="video-grid">

        <div class="video-item">
          <div class="video-embed-wrap">
            <iframe
              src="https://www.youtube.com/embed/D4xZp1IBla0"
              title="Video work by anubis3100"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>
          <div class="video-info">
            <p class="video-title">Video work</p>
            <p class="video-meta">Digital video</p>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer>
    <span>&copy; anubis3100</span>
    <a href="https://twitter.com/anubis_3100" target="_blank">Twitter ↗</a>
  </footer>

  <script>
    // ── painting dropdown ───────────────────────────────────────
    const paintingToggle = document.getElementById('painting-toggle');
    const paintingMenu = document.getElementById('painting-menu');
    paintingToggle.addEventListener('click', e => {
      e.stopPropagation();
      if (window.innerWidth >= 768) paintingMenu.classList.toggle('open');
    });

    // ── mobile nav ──────────────────────────────────────────────
    const navBurger = document.getElementById('nav-burger');
    const navLinksList = document.querySelector('.nav-links');
    navBurger.addEventListener('click', e => {
      e.stopPropagation();
      navBurger.classList.toggle('open');
      navLinksList.classList.toggle('mobile-open');
    });

    document.addEventListener('click', () => {
      paintingMenu.classList.remove('open');
      navBurger.classList.remove('open');
      navLinksList.classList.remove('mobile-open');
    });
  </script>
</body>
</html>
